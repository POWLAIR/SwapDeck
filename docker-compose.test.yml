version: '3.8'

# ─────────────────────────────────────────────────────
# SwapDeck — Stack de test isolée (CI / tests locaux)
#
# Usage :
#   docker compose -f docker-compose.test.yml up --build --abort-on-container-exit
#
# La DB est éphémère (pas de volume nommé).
# Le seed est chargé par le service migrate avant le démarrage de l'app.
# ─────────────────────────────────────────────────────

services:

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER:     swapdeck
      POSTGRES_PASSWORD: swapdeck
      POSTGRES_DB:       swapdeck_test
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U swapdeck"]
      interval: 5s
      timeout:  5s
      retries:  10

  migrate:
    build: .
    command: >
      sh -c "cd /app/backend &&
             ./node_modules/.bin/prisma db push --accept-data-loss &&
             node prisma/seed.js"
    environment:
      DATABASE_URL: postgresql://swapdeck:swapdeck@db:5432/swapdeck_test
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL:   postgresql://swapdeck:swapdeck@db:5432/swapdeck_test
      SESSION_SECRET: test-secret
      PORT:           3000
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
