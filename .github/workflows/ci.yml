name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # ────────────────────────────────────────────
  # Job 1 — Tests unitaires (Jest, pas de DB)
  # Prisma est mocké → aucun service requis.
  # Bloquant : les jobs suivants dépendent de lui.
  # ────────────────────────────────────────────
  unit-tests:
    name: Tests unitaires (Jest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Installer les dépendances backend
        run: cd backend && npm ci

      - name: Lancer les tests unitaires
        run: npm run test:unit

  # ────────────────────────────────────────────
  # Job 2 — Tests fonctionnels (Playwright)
  # Nécessite PostgreSQL + migrations + seed.
  # Playwright démarre le serveur via webServer.
  # Bloquant : le job load-tests dépend de lui.
  # ────────────────────────────────────────────
  e2e-tests:
    name: Tests fonctionnels (Playwright)
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER:     swapdeck
          POSTGRES_PASSWORD: swapdeck
          POSTGRES_DB:       swapdeck_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL:   postgresql://swapdeck:swapdeck@localhost:5432/swapdeck_test
      SESSION_SECRET: ci-secret-not-used-in-production
      PORT:           3000
      CI:             true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Installer les dépendances backend
        run: cd backend && npm ci

      - name: Appliquer le schéma Prisma
        run: cd backend && npx prisma db push --accept-data-loss

      - name: Insérer les données de seed
        run: cd backend && node prisma/seed.js

      - name: Installer les dépendances racine (Playwright)
        run: npm ci

      - name: Installer le navigateur Chromium
        run: npx playwright install --with-deps chromium

      - name: Lancer les tests E2E
        run: npm run test:e2e

      - name: Uploader le rapport Playwright
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ────────────────────────────────────────────
  # Job 3 — Tests de charge (k6)
  # Non-bloquant (continue-on-error: true).
  # Démarre son propre serveur + DB pour être
  # indépendant du job e2e-tests.
  # ────────────────────────────────────────────
  load-tests:
    name: Tests de charge (k6)
    runs-on: ubuntu-latest
    needs: e2e-tests
    continue-on-error: true

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER:     swapdeck
          POSTGRES_PASSWORD: swapdeck
          POSTGRES_DB:       swapdeck_load
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL:   postgresql://swapdeck:swapdeck@localhost:5432/swapdeck_load
      SESSION_SECRET: load-secret
      PORT:           3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache-dependency-path: backend/package-lock.json

      - name: Installer les dépendances backend
        run: cd backend && npm ci

      - name: Appliquer le schéma Prisma
        run: cd backend && npx prisma db push --accept-data-loss

      - name: Insérer les données de seed
        run: cd backend && node prisma/seed.js

      - name: Démarrer le serveur en arrière-plan
        run: node backend/src/server.js &

      - name: Attendre que le serveur soit prêt
        run: |
          for i in $(seq 1 15); do
            curl -sf http://localhost:3000/api/auth/me > /dev/null 2>&1 && echo "Serveur prêt" && exit 0
            echo "Attente... ($i/15)"
            sleep 2
          done
          echo "Le serveur n'a pas démarré à temps" && exit 1

      - name: Installer k6
        uses: grafana/setup-k6-action@v1

      - name: Test de charge — Catalogue
        run: k6 run tests/load/catalog.js

      - name: Test de charge — Négociation concurrente
        run: k6 run tests/load/concurrent-trade.js

      - name: Test de charge — Workflow négociation complet
        run: k6 run tests/load/negotiation.js

      - name: Uploader les résultats k6
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-results
          path: tests/load/results/
          retention-days: 7
